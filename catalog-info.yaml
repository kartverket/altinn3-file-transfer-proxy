apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: altinn3-proxy
  title: Altinn3 integrasjon
spec:
  type: service
  lifecycle: production
  owner: digibok

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: altinn3-motor
spec:
  type: service
  owner: digibok
  lifecycle: production
  dependsOn:
    - resource:default/grunnboksdatabasen
    - resource:default/altinn3-persistence
  system: system:default/grunnbok

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: altinn3-persistence
  title: Altinn3 transit database
spec:
  type: database
  owner: digibok

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: altinn3-api
spec:
  type: openapi
  owner: digibok
  lifecycle: production
  definition:
    $text: https://github.com/kartverket/altinn3-proxy/blob/main/specs/altinn-broker-v1.json

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: altinn3-events-server
spec:
  type: service
  owner: digibok
  lifecycle: production
  consumesApis:
    - api:default/altinn3-api
  dependsOn:
    - resource:default/altinn3-persistence
